<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurumsal İş Yemeği — Sahilde Restaurant Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --lacivert: #0d2b5e;
    --turkuaz: #00b4d8;
    --turkuaz-ac: #90e0ef;
    --altin: #c9a84c;
    --beyaz: #f8faff;
    --yazi: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--beyaz);
    color: var(--yazi);
    min-height: 100vh;
  }

  .bg-gradient {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,180,216,0.12) 0%, transparent 60%), var(--beyaz);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  header { padding: 30px 0 20px; text-align: center; }
  .logo-icon { width: 60px; height: 60px; margin-bottom: 10px; }
  .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 38px; color: var(--lacivert); }
  .logo-text span { color: var(--turkuaz); }

  .panel-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 30px rgba(13,43,94,0.06);
    margin-bottom: 20px;
    border: 1px solid rgba(0,180,216,0.1);
  }

  h2 { font-size: 15px; margin-bottom: 12px; color: var(--lacivert); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Grid Sistemleri */
  .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
  .time-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }

  .select-btn {
    padding: 12px 5px;
    border: 1.5px solid #eee;
    border-radius: 12px;
    background: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: #555;
  }

  .select-btn.active { 
    background: var(--lacivert); 
    color: white; 
    border-color: var(--lacivert);
    box-shadow: 0 4px 12px rgba(13,43,94,0.2);
  }

  input[type="datetime-local"], textarea {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid #eee;
    font-family: inherit;
    font-size: 14px;
    background: #fdfdfd;
  }

  textarea { height: 100px; resize: none; margin-top: 8px; }
  .input-label { display: block; font-size: 13px; color: #888; margin-top: 12px; margin-bottom: 4px; }

  .btn-complete {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #0d2b5e 0%, #1a4a8a 100%);
    color: white; border: none; border-radius: 18px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    box-shadow: 0 10px 25px rgba(13,43,94,0.25);
    transition: transform 0.2s;
  }

  .btn-complete:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="container">
  <header>
    <svg class="logo-icon" viewBox="0 0 64 64" fill="none">
      <path d="M32 52 L32 14" stroke="#0d2b5e" stroke-width="2" stroke-linecap="round"/>
      <path d="M32 14 L14 44 L32 44 Z" fill="#0d2b5e" opacity="0.15"/>
      <path d="M32 14 L50 38 L32 38 Z" fill="#00b4d8" opacity="0.6"/>
    </svg>
    <div class="logo-text">Sahil<span>'de</span></div>
    <div id="kurumIsmi" style="font-size: 14px; color: #666; margin-top: 5px; font-weight: 500;">Kurumsal Rezervasyon</div>
  </header>

  <div class="panel-card">
    <h2>Kaç Kişisiniz?</h2>
    <div class="grid-select" id="peopleSelect">
      <button class="select-btn" onclick="setVal('people', '1', this)">1</button>
      <button class="select-btn" onclick="setVal('people', '2', this)">2</button>
      <button class="select-btn" onclick="setVal('people', '3', this)">3</button>
      <button class="select-btn" onclick="setVal('people', '4', this)">4</button>
      <button class="select-btn" onclick="setVal('people', '5', this)">5</button>
      <button class="select-btn" onclick="setVal('people', '6', this)">6</button>
      <button class="select-btn" onclick="setVal('people', '7', this)">7</button>
      <button class="select-btn" onclick="setVal('people', '8', this)">8</button>
      <button class="select-btn" onclick="setVal('people', '9', this)">9</button>
      <button class="select-btn" onclick="setVal('people', '10+', this)">10+</button>
    </div>

    <h2>Ne Zaman Geleceksiniz?</h2>
    <div class="time-grid" id="timeSelect">
      <button class="select-btn" onclick="setVal('time', '30 Dakika İçinde', this)">30 dk</button>
      <button class="select-btn" onclick="setVal('time', '45 Dakika İçinde', this)">45 dk</button>
      <button class="select-btn" onclick="setVal('time', '1 Saat İçinde', this)">1 saat</button>
    </div>
    
    <span class="input-label">Veya İleri Bir Tarih/Saat Seçin:</span>
    <input type="datetime-local" id="customTime" onchange="clearTimeBtns()">

    <h2 style="margin-top: 24px;">Sipariş ve Notlar</h2>
    <span class="input-label">Menü Tercihleriniz:</span>
    <textarea id="menuOrder" placeholder="Fiziksel menüden seçtiğiniz yemekleri buraya yazabilirsiniz..."></textarea>
    
    <span class="input-label">Özel Notunuz (Alerji vb.):</span>
    <textarea id="extraNote" placeholder="Varsa eklemek istediğiniz notlar..."></textarea>
  </div>

  <button class="btn-complete" onclick="tamamla()">
    <svg viewBox="0 0 24 24" fill="currentColor" width="20">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Rezervasyonu Tamamla
  </button>
</div>

<script>
  let selection = { people: '', time: '' };

  // Sayfa yüklenince tarihi ayarla ve kurum ismini çek
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const kurum = params.get('kurum') || 'Kurumsal';
    document.getElementById('kurumIsmi').textContent = decodeURIComponent(kurum) + " Ekibi";
    
    // Tarih seçiciyi bugünden başlat
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('customTime').min = now.toISOString().slice(0, 16);
  };

  function setVal(type, val, btn) {
    selection[type] = val;
    const parent = btn.parentElement;
    parent.querySelectorAll('.select-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if(type === 'time') document.getElementById('customTime').value = '';
  }

  function clearTimeBtns() {
    selection.time = document.getElementById('customTime').value;
    document.getElementById('timeSelect').querySelectorAll('.select-btn').forEach(b => b.classList.remove('active'));
  }

  function tamamla() {
    const params = new URLSearchParams(window.location.search);
    const kurum = params.get('kurum') || 'Değerli Müşterimiz';
    const menu = document.getElementById('menuOrder').value || 'Belirtilmedi';
    const note = document.getElementById('extraNote').value || 'Yok';
    const timeVal = document.getElementById('customTime').value || selection.time;

    if(!selection.people || !timeVal) {
        alert("Lütfen kişi sayısı ve zaman seçiniz.");
        return;
    }

    const metin = `*Sahilde Restaurant - Kurumsal Rezervasyon*%0A%0A` +
                 `*Kurum:* ${decodeURIComponent(kurum)}%0A` +
                 `*Kişi:* ${selection.people}%0A` +
                 `*Zaman:* ${timeVal}%0A` +
                 `*Sipariş:* ${menu}%0A` +
                 `*Not:* ${note}`;

    window.open(`https://wa.me/905317321313?text=${metin}`, '_blank');
  }
</script>
</body>
</html>
